<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Markdown Kanban</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── Variables ── */
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface-alt: #f8f9fa;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --col-todo: #e2e8f0;
  --col-progress: #dbeafe;
  --col-done: #dcfce7;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
  --radius: 10px;
  --radius-sm: 6px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Fira Code', monospace;
}
.dark {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-alt: #334155;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --border: #334155;
  --col-todo: #1e293b;
  --col-progress: #172554;
  --col-done: #052e16;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .2s, color .2s;
}

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: .75rem 1.5rem; background: var(--surface);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  flex-wrap: wrap; gap: .5rem;
}
header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
header h1 span { font-size: 1.4rem; }
.actions { display: flex; gap: .4rem; flex-wrap: wrap; }

.btn {
  padding: .4rem .8rem; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); color: var(--text); cursor: pointer;
  font-size: .82rem; font-family: var(--font); transition: .15s;
  display: flex; align-items: center; gap: .3rem; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-hover); }
.btn.danger { color: #ef4444; }
.btn.danger:hover { border-color: #ef4444; background: #fef2f2; }
.dark .btn.danger:hover { background: #450a0a; }

/* ── Board ── */
.board {
  display: flex; gap: 1rem; padding: 1.5rem; overflow-x: auto;
  min-height: calc(100vh - 70px); align-items: flex-start;
}
.column {
  flex: 0 0 300px; background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); display: flex; flex-direction: column;
  max-height: calc(100vh - 120px); box-shadow: var(--shadow);
}
.column-header {
  padding: .75rem 1rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  cursor: grab; user-select: none;
}
.column-header:active { cursor: grabbing; }
.column-header h2 {
  font-size: .95rem; font-weight: 600; display: flex; align-items: center; gap: .4rem;
}
.col-count {
  background: var(--surface-alt); padding: .1rem .45rem; border-radius: 999px;
  font-size: .75rem; color: var(--text-muted);
}
.col-actions { display: flex; gap: .2rem; }
.col-actions button {
  background: none; border: none; cursor: pointer; font-size: 1rem;
  color: var(--text-muted); padding: .1rem .3rem; border-radius: 4px;
}
.col-actions button:hover { color: var(--text); background: var(--surface-alt); }

.column-body {
  flex: 1; overflow-y: auto; padding: .5rem;
  min-height: 60px;
  transition: background .15s;
}
.column-body.drag-over { background: var(--surface-alt); }

/* ── Cards ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: .65rem .75rem; margin-bottom: .5rem;
  cursor: grab; box-shadow: var(--shadow); transition: .15s; position: relative;
}
.card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); }
.card.dragging { opacity: 0.4; transform: rotate(2deg); }
.card:active { cursor: grabbing; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: .3rem; }
.card-title {
  font-weight: 600; font-size: .88rem; flex: 1; word-break: break-word;
}
.card-actions { display: flex; gap: .15rem; opacity: 0; transition: .15s; }
.card:hover .card-actions { opacity: 1; }
.card-actions button {
  background: none; border: none; cursor: pointer; font-size: .85rem;
  color: var(--text-muted); padding: 0 .2rem; border-radius: 3px;
}
.card-actions button:hover { color: var(--text); }
.card-actions button.delete:hover { color: #ef4444; }

.card-body {
  margin-top: .4rem; font-size: .82rem; color: var(--text-muted);
  line-height: 1.5; max-height: 200px; overflow-y: auto;
}
.card-body p { margin: .3em 0; }
.card-body p:first-child { margin-top: 0; }
.card-body code {
  background: var(--surface-alt); padding: .1em .3em; border-radius: 3px;
  font-family: var(--mono); font-size: .85em;
}
.card-body pre {
  background: var(--surface-alt); padding: .5em; border-radius: 4px;
  overflow-x: auto; font-family: var(--mono); font-size: .8em;
}
.card-body ul, .card-body ol { padding-left: 1.2em; margin: .3em 0; }
.card-body blockquote {
  border-left: 3px solid var(--accent); padding-left: .5em;
  margin: .3em 0; color: var(--text-muted);
}
.card-body a { color: var(--accent); }
.card-body img { max-width: 100%; border-radius: 4px; }

.card-footer {
  margin-top: .5rem; font-size: .7rem; color: var(--text-muted);
  display: flex; justify-content: space-between;
}

/* ── Add card / column buttons ── */
.add-card-btn {
  width: 100%; padding: .5rem; border: 2px dashed var(--border); border-radius: var(--radius-sm);
  background: none; color: var(--text-muted); cursor: pointer; font-size: .82rem;
  font-family: var(--font); transition: .15s; margin-top: .25rem;
}
.add-card-btn:hover { border-color: var(--accent); color: var(--accent); }

.add-column-btn {
  flex: 0 0 300px; padding: 1.5rem; border: 2px dashed var(--border);
  border-radius: var(--radius); background: none; color: var(--text-muted);
  cursor: pointer; font-size: .9rem; font-family: var(--font); transition: .15s;
  display: flex; align-items: center; justify-content: center; gap: .4rem;
  min-height: 120px;
}
.add-column-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; justify-content: center; align-items: center; padding: 1rem;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius); padding: 1.5rem;
  width: 100%; max-width: 500px; box-shadow: var(--shadow-lg);
  max-height: 90vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 1rem; }
.modal label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .25rem; margin-top: .75rem; }
.modal label:first-of-type { margin-top: 0; }
.modal input, .modal textarea {
  width: 100%; padding: .5rem .7rem; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: var(--font); font-size: .88rem;
  background: var(--surface); color: var(--text);
}
.modal input:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
.modal textarea { min-height: 120px; resize: vertical; font-family: var(--mono); font-size: .82rem; }
.modal .preview {
  margin-top: .5rem; padding: .75rem; background: var(--surface-alt);
  border-radius: var(--radius-sm); min-height: 40px; font-size: .82rem; line-height: 1.5;
  max-height: 200px; overflow-y: auto;
}
.modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1.25rem; }
.tabs { display: flex; gap: 0; margin-bottom: .5rem; }
.tab {
  padding: .3rem .7rem; background: none; border: 1px solid var(--border);
  cursor: pointer; font-size: .8rem; font-family: var(--font); color: var(--text-muted);
}
.tab:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
.tab:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Empty state */
.empty-state {
  text-align: center; padding: 2rem 1rem; color: var(--text-muted);
}
.empty-state .icon { font-size: 2rem; margin-bottom: .5rem; }

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); padding: .6rem 1.2rem;
  border-radius: 999px; font-size: .85rem; z-index: 300;
  opacity: 0; transition: opacity .3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1><span>📋</span> Markdown Kanban</h1>
  <div class="actions">
    <button class="btn" onclick="toggleTheme()" title="Toggle dark mode">🌓</button>
    <button class="btn" onclick="exportBoard()">📥 Export</button>
    <button class="btn" onclick="document.getElementById('import-file').click()">📤 Import</button>
    <button class="btn danger" onclick="resetBoard()">🗑️ Reset</button>
  </div>
</header>

<div class="board" id="board">
  <!-- Columns rendered by JS -->
</div>

<!-- Hidden file input for import -->
<input type="file" id="import-file" accept=".json" style="display:none" onchange="importBoard(event)">

<!-- Card/Column Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Edit Card</h3>
    <div class="tabs" id="modal-tabs">
      <button class="tab active" onclick="switchTab('write')">✍️ Write</button>
      <button class="tab" onclick="switchTab('preview')">👁 Preview</button>
    </div>
    <label for="card-title-input">Title</label>
    <input type="text" id="card-title-input" placeholder="Card title...">
    <label for="card-body-input">Body (Markdown)</label>
    <textarea id="card-body-input" placeholder="Write markdown here...&#10;&#10;## Heading&#10;- list item&#10;- another&#10;&#10;**bold** *italic* `code`" oninput="updatePreview()"></textarea>
    <div class="preview" id="preview-area" style="display:none;"></div>
    <div class="modal-actions">
      <button class="btn danger" id="modal-delete-btn" style="display:none; margin-right: auto;" onclick="deleteCard()">🗑️ Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
const STORAGE_KEY = 'md-kanban-board';
let boardData = loadBoard();
let editingCard = null; // {colId, cardId}
let editingColumnId = null;

// ── Default data ──
function defaultBoard() {
  return {
    columns: [
      {
        id: 'col_1', name: '📥 Todo', cards: [
          { id: 'c1', title: 'Welcome! 👋', body: 'This is a **Markdown** kanban board.\n\n- Drag cards between columns\n- Click a card to edit\n- All data saved in your browser', created: Date.now() },
          { id: 'c2', title: 'Try markdown', body: '## Features\n\n- **Bold** and *italic*\n- `inline code`\n- Lists and links\n- [GitHub](https://github.com)', created: Date.now() - 100000 },
        ]
      },
      {
        id: 'col_2', name: '🔄 In Progress', cards: [
          { id: 'c3', title: 'Drag me!', body: 'Drag this card to another column.\n\n> Tip: You can also reorder cards within a column.', created: Date.now() - 200000 },
        ]
      },
      {
        id: 'col_3', name: '✅ Done', cards: [
          { id: 'c4', title: 'Setup complete', body: 'The board is ready to use!\n\n- [x] Create columns\n- [x] Add cards\n- [x] Dark mode', created: Date.now() - 300000 },
        ]
      },
    ]
  };
}

function loadBoard() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultBoard();
}

function saveBoard() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(boardData));
  render();
}

// ── Render ──
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  boardData.columns.forEach((col, colIdx) => {
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.setAttribute('data-col-id', col.id);
    colEl.setAttribute('draggable', 'true');
    colEl.addEventListener('dragstart', e => handleColDragStart(e, col.id));
    colEl.addEventListener('dragend', handleDragEnd);

    colEl.innerHTML = `
      <div class="column-header">
        <h2>${escapeHtml(col.name)} <span class="col-count">${col.cards.length}</span></h2>
        <div class="col-actions">
          <button title="Rename column" onclick="renameColumn('${col.id}')">✏️</button>
          <button title="Delete column" onclick="deleteColumn('${col.id}')">🗑️</button>
        </div>
      </div>
      <div class="column-body" data-col-id="${col.id}"
           ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${col.id}')">
        ${col.cards.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><p>Drop cards here</p></div>' : ''}
        ${col.cards.map(card => `
          <div class="card" draggable="true" data-card-id="${card.id}" data-col-id="${col.id}"
               ondragstart="handleCardDragStart(event, '${card.id}', '${col.id}')" ondragend="handleDragEnd(event)"
               onclick="openCard('${col.id}', '${card.id}')">
            <div class="card-header">
              <div class="card-title">${escapeHtml(card.title)}</div>
              <div class="card-actions">
                <button title="Edit" onclick="event.stopPropagation(); openCard('${col.id}', '${card.id}')">✏️</button>
                <button class="delete" title="Delete" onclick="event.stopPropagation(); deleteCardDirect('${col.id}', '${card.id}')">×</button>
              </div>
            </div>
            ${card.body ? `<div class="card-body">${marked.parse(card.body)}</div>` : ''}
            ${card.created ? `<div class="card-footer"><span>${timeAgo(card.created)}</span></div>` : ''}
          </div>
        `).join('')}
        <button class="add-card-btn" onclick="event.stopPropagation(); openNewCard('${col.id}')">+ Add card</button>
      </div>
    `;
    board.appendChild(colEl);
  });

  // Add-column button
  const addCol = document.createElement('button');
  addCol.className = 'add-column-btn';
  addCol.textContent = '+ Add Column';
  addCol.onclick = addColumn;
  board.appendChild(addCol);
}

// ── Drag & Drop ──
let draggedCard = null;
let draggedColumn = null;
let dragSourceCol = null;

function handleCardDragStart(e, cardId, colId) {
  draggedCard = cardId;
  dragSourceCol = colId;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', cardId);
}

function handleColDragStart(e, colId) {
  if (e.target.closest('.column-body') || e.target.closest('.column-header button') ||
      e.target.closest('.add-card-btn') || e.target.closest('.card')) {
    e.preventDefault();
    return;
  }
  draggedColumn = colId;
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd(e) {
  draggedCard = null;
  draggedColumn = null;
  dragSourceCol = null;
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const body = e.target.closest('.column-body');
  if (body) body.classList.add('drag-over');
}

function handleDragLeave(e) {
  const body = e.target.closest('.column-body');
  if (body && !body.contains(e.relatedTarget)) {
    body.classList.remove('drag-over');
  }
}

function handleDrop(e, targetColId) {
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

  // Column reorder
  if (draggedColumn && !draggedCard) {
    const fromIdx = boardData.columns.findIndex(c => c.id === draggedColumn);
    const toIdx = boardData.columns.findIndex(c => c.id === targetColId);
    if (fromIdx !== -1 && toIdx !== -1 && fromIdx !== toIdx) {
      const [col] = boardData.columns.splice(fromIdx, 1);
      boardData.columns.splice(toIdx, 0, col);
    }
    saveBoard();
    return;
  }

  // Card move
  if (draggedCard) {
    const srcCol = boardData.columns.find(c => c.id === dragSourceCol);
    const dstCol = boardData.columns.find(c => c.id === targetColId);
    if (!srcCol || !dstCol) return;

    const cardIdx = srcCol.cards.findIndex(c => c.id === draggedCard);
    if (cardIdx === -1) return;

    const [card] = srcCol.cards.splice(cardIdx, 1);

    // Insert at drop position (or end)
    const dropTarget = e.target.closest('.card');
    if (dropTarget && dropTarget.dataset.colId === targetColId) {
      const targetIdx = dstCol.cards.findIndex(c => c.id === dropTarget.dataset.cardId);
      dstCol.cards.splice(targetIdx, 0, card);
    } else {
      dstCol.cards.push(card);
    }

    saveBoard();
  }
}

// ── Column operations ──
function addColumn() {
  const name = prompt('Column name:', 'New Column');
  if (!name || !name.trim()) return;
  boardData.columns.push({
    id: 'col_' + Date.now(),
    name: name.trim(),
    cards: [],
  });
  saveBoard();
}

function renameColumn(colId) {
  const col = boardData.columns.find(c => c.id === colId);
  if (!col) return;
  const name = prompt('Rename column:', col.name);
  if (name && name.trim()) {
    col.name = name.trim();
    saveBoard();
  }
}

function deleteColumn(colId) {
  const col = boardData.columns.find(c => c.id === colId);
  if (!col) return;
  if (!confirm(`Delete column "${col.name}" and all its cards?`)) return;
  boardData.columns = boardData.columns.filter(c => c.id !== colId);
  saveBoard();
}

// ── Card operations ──
function openNewCard(colId) {
  editingCard = null;
  editingColumnId = colId;
  document.getElementById('modal-title').textContent = 'New Card';
  document.getElementById('card-title-input').value = '';
  document.getElementById('card-body-input').value = '';
  document.getElementById('modal-delete-btn').style.display = 'none';
  document.getElementById('modal-tabs').style.display = 'flex';
  switchTab('write');
  openModal();
}

function openCard(colId, cardId) {
  const col = boardData.columns.find(c => c.id === colId);
  if (!col) return;
  const card = col.cards.find(c => c.id === cardId);
  if (!card) return;

  editingCard = { colId, cardId };
  editingColumnId = null;
  document.getElementById('modal-title').textContent = 'Edit Card';
  document.getElementById('card-title-input').value = card.title;
  document.getElementById('card-body-input').value = card.body || '';
  document.getElementById('modal-delete-btn').style.display = 'inline-block';
  document.getElementById('modal-tabs').style.display = 'flex';
  switchTab('write');
  openModal();
}

function saveCard() {
  const title = document.getElementById('card-title-input').value.trim();
  if (!title) { showToast('⚠️ Title is required'); return; }
  const body = document.getElementById('card-body-input').value.trim();

  if (editingCard) {
    const col = boardData.columns.find(c => c.id === editingCard.colId);
    if (!col) return;
    const card = col.cards.find(c => c.id === editingCard.cardId);
    if (!card) return;
    card.title = title;
    card.body = body;
  } else if (editingColumnId) {
    const col = boardData.columns.find(c => c.id === editingColumnId);
    if (!col) return;
    col.cards.push({
      id: 'c' + Date.now(),
      title,
      body,
      created: Date.now(),
    });
  }
  closeModal();
  saveBoard();
}

function deleteCard() {
  if (!editingCard) return;
  if (!confirm('Delete this card?')) return;
  const col = boardData.columns.find(c => c.id === editingCard.colId);
  if (!col) return;
  col.cards = col.cards.filter(c => c.id !== editingCard.cardId);
  closeModal();
  saveBoard();
}

function deleteCardDirect(colId, cardId) {
  if (!confirm('Delete this card?')) return;
  const col = boardData.columns.find(c => c.id === colId);
  if (!col) return;
  col.cards = col.cards.filter(c => c.id !== cardId);
  saveBoard();
}

// ── Modal ──
function openModal() {
  document.getElementById('modal').classList.add('active');
  document.getElementById('card-title-input').focus();
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  editingCard = null;
  editingColumnId = null;
}
function switchTab(tab) {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.classList.remove('active'));
  tabs[tab === 'write' ? 0 : 1].classList.add('active');

  const textarea = document.getElementById('card-body-input');
  const preview = document.getElementById('preview-area');

  if (tab === 'write') {
    textarea.style.display = 'block';
    preview.style.display = 'none';
  } else {
    textarea.style.display = 'none';
    preview.style.display = 'block';
    updatePreview();
  }
}
function updatePreview() {
  const md = document.getElementById('card-body-input').value;
  document.getElementById('preview-area').innerHTML = marked.parse(md || '*Nothing to preview*');
}

// ── Import / Export ──
function exportBoard() {
  const blob = new Blob([JSON.stringify(boardData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'kanban-export.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('📥 Board exported!');
}

function importBoard(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.columns || !Array.isArray(data.columns)) throw new Error('Invalid format');
      if (!confirm(`Import board with ${data.columns.length} columns? This will replace your current board.`)) return;
      boardData = data;
      saveBoard();
      showToast('📤 Board imported!');
    } catch(err) {
      showToast('❌ Invalid file format');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetBoard() {
  if (!confirm('Reset board to default? All your data will be lost.')) return;
  boardData = defaultBoard();
  saveBoard();
  showToast('🗑️ Board reset!');
}

// ── Theme ──
function initTheme() {
  const saved = localStorage.getItem('md-kanban-theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  }
}
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('md-kanban-theme', isDark ? 'dark' : 'light');
}

// ── Helpers ──
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours / 24)}d ago`;
}
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'n' && e.ctrlKey && !e.target.closest('input,textarea')) {
    e.preventDefault();
    if (boardData.columns.length > 0) {
      openNewCard(boardData.columns[0].id);
    }
  }
  if (e.key === 't' && e.ctrlKey && !e.target.closest('input,textarea')) {
    e.preventDefault();
    toggleTheme();
  }
});

// Modal click-outside
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── Init ──
initTheme();
render();
</script>
</body>
</html>
